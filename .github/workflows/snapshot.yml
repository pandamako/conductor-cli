name: Snapshot

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: build --snapshot --clean

      - uses: actions/upload-artifact@v4
        with:
          name: conductor-cli-snapshot
          path: dist/conductor-cli_*/conductor-cli
          retention-days: 7
